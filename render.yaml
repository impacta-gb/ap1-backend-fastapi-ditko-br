services:
  # ==================== ZOOKEEPER ====================
  - type: web
    name: lostfound-zookeeper
    runtime: docker
    dockerfilePath: ./docker-compose.yml
    plan: starter

  # ==================== KAFKA ====================
  - type: web
    name: lostfound-kafka
    runtime: docker
    dockerfilePath: ./docker-compose.yml
    plan: starter
    envVars:
      - key: KAFKA_ADVERTISED_LISTENERS
        value: "PLAINTEXT://lostfound-kafka:9092"

  # ==================== SERVIÇO DE ITEM ====================
  - type: web
    name: lostfound-item
    runtime: python
    rootDir: ./item
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5000
    plan: starter
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # ==================== SERVIÇO DE LOCAL ====================
