services:
  # Serviço de Item
  - type: web
    name: lostfound-item
    runtime: python
    rootDir: ./item
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5000
    plan: starter
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        fromService:
          type: env
          name: KAFKA_BOOTSTRAP_SERVERS
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Serviço de Local
  - type: web
    name: lostfound-local
    runtime: python
    rootDir: ./local
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5001
    plan: starter
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        fromService:
          type: env
