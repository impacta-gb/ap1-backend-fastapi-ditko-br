services:
  # ==================== ZOOKEEPER ====================
  - type: web
    name: lostfound-zookeeper
    runtime: docker
    dockerfilePath: ./docker-compose.yml
    plan: starter
    port: 2181
    healthCheckPath: /

  # ==================== KAFKA ====================
  - type: web
    name: lostfound-kafka
    runtime: docker
    dockerfilePath: ./docker-compose.yml
    plan: starter
    port: 9092
    healthCheckPath: /
    envVars:
      - key: KAFKA_ADVERTISED_LISTENERS
        value: "PLAINTEXT://lostfound-kafka:9092"

  # ==================== SERVIÇO DE ITEM ====================
  - type: web
    name: lostfound-item
    runtime: python
    rootDir: ./item
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5000
    plan: starter
    port: 5000
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db-item
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Serviço de Local
  - type: web
    name: lostfound-local
    runtime: python
    rootDir: ./local
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5001
    plan: starter
    port: 5001
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db-local
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Serviço de Responsável
  - type: web
    name: lostfound-responsavel
    runtime: python
    rootDir: ./responsavel
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5002
    plan: starter
    port: 5002
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db-responsavel
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Serviço de Devolução
  - type: web
    name: lostfound-devolucao
    runtime: python
    rootDir: ./devolucao
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5003
    plan: starter
    port: 5003
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db-devolucao
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Serviço de Reclamante
  - type: web
    name: lostfound-reclamante
    runtime: python
    rootDir: ./reclamante
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5004
    plan: starter
    port: 5004
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "lostfound-kafka:9092"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: lostfound-db-reclamante
          property: connectionString
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info

  # Bancos de Dados PostgreSQL (um por serviço)
  - type: pserv
    name: lostfound-db-item
    databaseName: item_db
    user: item_user
    plan: starter

  - type: pserv
    name: lostfound-db-local
    databaseName: local_db
    user: local_user
    plan: starter

  - type: pserv
    name: lostfound-db-responsavel
    databaseName: responsavel_db
    user: responsavel_user
    plan: starter

  - type: pserv
    name: lostfound-db-devolucao
    databaseName: devolucao_db
    user: devolucao_user
    plan: starter

  - type: pserv
    name: lostfound-db-reclamante
    databaseName: reclamante_db
    user: reclamante_user
    plan: starter
