version: '3.8'

services:
  devolucao:
    build: ./devolucao
    ports:
      - "5003:5003"
    volumes:
      - ./devolucao:/app
    networks:
      - backend
    container_name: devolucao

  reclamante:
    build: ./reclamante
    ports:
      - "5001:5001"
    volumes:
      - ./reclamante:/app
    networks:
      - backend
    container_name: reclamante

  responsavel:
    build: ./responsavel
    ports:
      - "5002:5002"
    volumes:
      - ./responsavel:/app
    networks:
      - backend
    container_name: responsavel

  local:
    build: ./local
    ports:
      - "5000:5000"
    volumes:
      - ./local:/app
    networks:
      - backend
    container_name: local

  item:
    build: ./item
    ports:
      - "5004:5004"
    volumes:
      - ./item:/app
    networks:
      - backend
    container_name: item

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5

networks:
  backend:
    driver: bridge
  kafka-network:
    driver: bridge
